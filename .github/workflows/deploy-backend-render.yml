name: Deploy Backend to Render

on:
  push:
    branches:
      - main
      - master
    paths:
      - backend/**
      - .github/workflows/deploy-backend-render.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deployment triggered successfully."

      - name: Optional backend health check
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -n "$BACKEND_HEALTHCHECK_URL" ]; then
            echo "Running health check: $BACKEND_HEALTHCHECK_URL"
            curl -fsS "$BACKEND_HEALTHCHECK_URL"
            echo "Health check passed."
          else
            echo "Skipping health check (BACKEND_HEALTHCHECK_URL not set)."
          fi
